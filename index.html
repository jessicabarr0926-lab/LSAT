<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JessiPreps</title>
    <link rel="stylesheet" href="./jessipreps.css" />
  </head>
  <body>
    <button id="sidebarToggle" class="sidebar-fab" aria-label="Toggle sidebar">☰</button>
    <div class="app-shell">
      <aside class="sidebar" id="sidebarPanel">
        <div class="sidebar__toolbar">
          <button id="sidebarClose" class="sidebar__close" aria-label="Close sidebar">×</button>
        </div>
        <div class="brand">
          <div class="brand__text">
            <p class="eyebrow">Personal LSAT Operating System</p>
            <h1>JessiPreps</h1>
            <p class="muted">Premium study flow built to remove decision fatigue.</p>
          </div>
        </div>

        <nav class="nav" id="navRail"></nav>

        <section class="sidebar-card">
          <p class="sidebar-card__label">Accessibility</p>
          <div id="settingsPanel" class="settings-grid"></div>
        </section>

        <section class="sidebar-card">
          <p class="sidebar-card__label">Today</p>
          <div id="todayCard"></div>
        </section>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p id="routeEyebrow" class="eyebrow">Dashboard</p>
            <h2 id="routeTitle">Command Center</h2>
          </div>
          <div class="topbar__actions">
            <button id="quickStart" class="button button--primary">Do the next best thing</button>
            <button id="openWeakest" class="button button--ghost">Weakest skill</button>
          </div>
        </header>

        <section id="heroMount"></section>
        <section id="pageMount" class="page-grid"></section>
      </main>
    </div>

    <script src="./content.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
